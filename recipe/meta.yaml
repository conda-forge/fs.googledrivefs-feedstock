{% set name = "fs.googledrivefs" %}
{% set version = "2.6.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/fs_googledrivefs-{{ version }}.tar.gz
  sha256: 42e033502cb2fa9665882beba19d276c4285644b7048e3550dae3dc36d5086a8

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - fs >=2.4.13
    - google-api-python-client >=1.7.10
    - google-auth >=1.5.1

test:
  imports:
    - fs
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/rkhwaja/fs.googledrivefs
  summary: Pyfilesystem2 implementation for Google Drive
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
